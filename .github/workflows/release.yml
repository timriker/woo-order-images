name: Create Release Package

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: PHP Lint
        run: find . -name "*.php" -type f -exec php -l {} \;

  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: tag_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract changelog entry
        id: changelog
        run: |
          awk '/^## \['"${{ steps.tag_version.outputs.VERSION }}"'\]/{flag=1;next}/^## \[/{flag=0}flag' CHANGELOG.md > /tmp/woi-release-notes.md
          {
            echo "RELEASE_NOTES<<EOF"
            cat /tmp/woi-release-notes.md
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create plugin directory structure
        run: |
          mkdir -p release/woo-order-images
          cp -r assets includes *.php *.md release/woo-order-images/

      - name: Create zip file
        run: |
          cd release
          zip -r woo-order-images-${{ steps.tag_version.outputs.VERSION }}.zip woo-order-images

      - name: Create Release and Upload Asset
        uses: ncipollo/release-action@v1
        with:
          artifacts: "release/woo-order-images-${{ steps.tag_version.outputs.VERSION }}.zip"
          artifactErrorsFailBuild: true
          tag: v${{ steps.tag_version.outputs.VERSION }}
          name: Woo Order Images v${{ steps.tag_version.outputs.VERSION }}
          body: |
            ## Woo Order Images v${{ steps.tag_version.outputs.VERSION }}

            ${{ steps.changelog.outputs.RELEASE_NOTES }}

            Download `woo-order-images-${{ steps.tag_version.outputs.VERSION }}.zip` below to install on your WordPress site.

            **Installation:**
            1. Download the .zip file
            2. Go to WordPress Admin → Plugins → Add New
            3. Click "Upload Plugin" and select the .zip file
            4. Click "Install Now" then "Activate Plugin"

            **Configuration:**
            - Visit WooCommerce → Order Images to configure settings
            - Set per-product image requirements in each product's "Woo Order Images" tab
            - See `CHANGELOG.md` in the repo for full release history
          draft: false
          prerelease: false
